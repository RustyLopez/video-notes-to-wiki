version: '3.8'

services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: videonotes
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  spring-boot-app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - chroma
      - ollama
      - postgres
      - whisper-wrapper
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/videonotes
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      OLLAMA_URL: http://ollama:11434
      CHROMA_URL: http://chroma:8000
      CHROMA_HOST: http://chroma
      CHROMA_PORT: 8000
    volumes: # TODO make the local dir configurable
      - ./media-input:/media-input
      - ./media-transcribed:/media-transcribed

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      # NOTE we are mounting these and don't want to include them in the docker context or everything gets copied..
      - ./ollama-models:/root/.ollama
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - ./chroma-data:/chroma/chroma
    restart: unless-stopped

  # Whisper wrapper is hosted as an external service, so that we can scale it independently as it is loading the models and not handling end user requests directly.
  # It will need to have the same volume mount as this service.
  # we'll need to do something similar with the kubectl but give that service different resource settings
  whisper-wrapper:
    build: ./whisper-wrapper
    ports: # TODO allocate a different port here , need to remember which is external. Note should only be accessible inside the cluster.
      - "8070:8080"
    #    depends_on:
    #      - postgres
    environment:
      MEDIA_INPUT: /media-input # else for standalone spring bot it's just ./media-input relative to the local project, which btw tends to be sub repo embedded in the current configuration.
    #      SPRING_DATASOURCE_USERNAME: user
    #      SPRING_DATASOURCE_PASSWORD: password
    volumes: # TODO make the local dir configurable
      - ../media-input:/media-input