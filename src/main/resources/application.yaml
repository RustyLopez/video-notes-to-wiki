spring:
  profiles:
    # NOTE: Security: Caution: For now hosting only as an internal docker service used by a separate app in the same docker env.
    # The app currently exposes the transcribe operation, though that does let you specify a known path.
    # so in theory there is some risk of extracting transcripts from videos on disk if this were opened up.
    # not an issue for now but we'll probably want to add some server to server auth solution when we push this into eks.
    active: internal-only
  application:
    name: video-notes-to-wiki
  datasource:
    url: ${SPRING_VECTOR_DB_POSTGRES_DATASOURCE_URL:jdbc:postgresql://localhost:5432/video_notes}
    username: ${SPRING_VECTOR_DB_POSTGRES_DATASOURCE_USERNAME:user}
    password: ${SPRING_VECTOR_DB_POSTGRES_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  r2dbc:
    url: ${SPRING_R2DBC_DATASOURCE_URL:r2dbc:postgresql://localhost:5432/video_notes}
    username: ${SPRING_R2DBC_DATASOURCE_USERNAME:user}
    password: ${SPRING_R2DBC_DATASOURCE_PASSWORD:password}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: public
  ai:
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:8080/v1}
      init:
        chat:
          additional-model: ${app.llm.chat.models.preferred}
        embedding:
          additional-model: ${app.llm.embeddings.models.preferred}
        pull-model-strategy: when_missing # NOTE we issue ar eques tot hte remote olllma service to have it pull. We are not running tha locally in the jvm or even the same.. service instance necessarily
        pull-model-strategy.max-retries: 2
    vectorstore:
      pgvector:
        index-type: hnsw
        # NOTE: column cannot have more than 2000 dimensions for hnsw index. NOt sure if we should use a different index or  if this is a non issue. 1536 is the default
        # note that if the db schema has already been initialized
        # it  won't let you fix this. For now , I'm going to delete the entire mounted volume data dir but there's probably a less nuclear optin.
        dimensions: 1536 #
        distance-type: COSINE_DISTANCE
        initialize-schema: true
        remove-existing-vector-store-table: false
        # maybe we aren't supposed to validate if we are.. initializing it...
        # yeah confirmed. The table got created when i disabled validation.
        # Kind of quirky
        schema-validation: false
        schema-name: public
        table-name: vector_store

app:
  media-input: ${MEDIA_INPUT:./media-input}
  wiki-output: ${WIKI_OUTPUT:./wiki-output}
  llm:
    chat:
      models:
        # spring ai may setup multiple so we need to clarify our preferred.
        preferred: Qwen/Qwen3.5-9B
    embeddings:
      models:
        # spring ai may setup multiple so we need to clarify our preferred.
        preferred: jinaai/jina-embeddings-v4
    contextWindowTokens: 4096 # TODO need to be absed on cofngured lllm for chat. This si way off for our model.
    maxChunkTokens: 4096 # this is way off
    reductionRatio: 0.3
    threadPoolSize: 5
    maxMemoryUsageMb: 1024
    promptOverheadTokens: 500

---
spring:
  config:
    activate:
      on-profile: test
app:
