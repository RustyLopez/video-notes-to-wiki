spring:
  application:
    name: video-notes-to-wiki
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/video_notes
    username: postgres
    password: password
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  ai:
    ollama:
      base-url: ${app.llm.url}
      init:
        chat:
          additional-model: qwen2.5:7b
        embedding:
          additional-model: jinaai/jina-embeddings-v2-base-en:latest
        pull-model-strategy: when_missing
        pull-model-strategy.max-retries: 2

app:
  llm:
    url: ${OLLAMA_URL:http://localhost:8080/v1}
    contextWindowTokens: 4096
    maxChunkTokens: 4096
    reductionRatio: 0.3
    threadPoolSize: 5
    maxMemoryUsageMb: 1024
    promptOverheadTokens: 500
  vectordb:
    url: ${LANCEDB_URL:http://localhost:8000}
