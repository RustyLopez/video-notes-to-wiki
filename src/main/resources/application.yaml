spring:
  application:
    name: video-notes-to-wiki
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/video_notes
    username: postgres
    password: password
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

app:
  llm:
    url: ${OLLAMA_URL:http://localhost:8080/v1}
    contextWindowTokens: 4096
    maxChunkTokens: 4096
    reductionRatio: 0.3
    threadPoolSize: 5
    maxMemoryUsageMb: 1024
    promptOverheadTokens: 500
